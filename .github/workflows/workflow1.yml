name: CREATE Docker image and EC2

on:
  workflow_dispatch:

jobs:

  job1:
    runs-on: ubuntu-latest
    steps:
      - name: docker-build
        run: sudo docker build myapplatest:v1 .

  job2:
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: terraform plan
        run: terraform init
        run: terraform plan


  job3:
    runs-on: ubuntu-latest
    needs: terraform plan
    steps:
      - name: terraform apply
        run: terraform apply
