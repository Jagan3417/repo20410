name: CREATE Docker image and EC2

on:
  workflow_dispatch:

jobs:

  job1:
    runs-on: ubuntu-latest
    steps:
      - name: docker-build
        run: sudo docker build myapplatest:v1 

  job2:
    runs-on: ubuntu-latest
    needs: job1
    steps:
      - name: terraform plan
        run: terraform plan

  job3:
    runs-on: ubuntu-latest
    needs: job2
    steps:
      - name: terraform apply
        run: terraform apply
